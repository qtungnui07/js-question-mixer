name: Build Convert Tool

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller python-docx

      - name: Build exe
        run: |
          pyinstaller --onefile convert.py

      - name: Prepare files
        run: |
          copy dist\convert.exe convert.exe

          @"
          @echo off
          setlocal
          if not exist "C:\tools" (
              mkdir "C:\tools"
          ) else (
              echo C:\tools already exists
          )
          if exist "%~dp0convert.exe" (
              move /y "%~dp0convert.exe" "C:\tools\convert.exe"
          ) else (
              echo convert.exe not found
          )
          echo %PATH% | find /i "C:\tools" >nul
          if errorlevel 1 (
              setx PATH "%PATH%;C:\tools"
              echo Added C:\tools to PATH
          ) else (
              echo PATH already contains C:\tools
          )
          echo Done
          pause
          "@ | Out-File -Encoding ASCII setup.bat

      - name: Create ZIP
        run: |
          powershell Compress-Archive convert.exe,setup.bat convert-tool.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: convert-tool
          path: convert-tool.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: convert-tool.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}