name: Build Convert Tool
permissions:
  contents: write
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile convert.py

      - name: Prepare files
        run: |
          copy dist\convert.exe convert.exe
      
          echo @echo off > setup.bat
          echo setlocal >> setup.bat
          echo if not exist "C:\tools" ( >> setup.bat
          echo     mkdir "C:\tools" >> setup.bat
          echo ) else ( >> setup.bat
          echo     echo C:\tools already exists >> setup.bat
          echo ) >> setup.bat
          echo if exist "%%~dp0convert.exe" ( >> setup.bat
          echo     move /y "%%~dp0convert.exe" "C:\tools\convert.exe" >> setup.bat
          echo ) else ( >> setup.bat
          echo     echo convert.exe not found >> setup.bat
          echo ) >> setup.bat
          echo echo %%PATH%% ^| find /i "C:\tools" ^>nul >> setup.bat
          echo if errorlevel 1 ( >> setup.bat
          echo     setx PATH "%%PATH%%;C:\tools" >> setup.bat
          echo     echo Added C:\tools to PATH >> setup.bat
          echo ) else ( >> setup.bat
          echo     echo PATH already contains C:\tools >> setup.bat
          echo ) >> setup.bat
          echo echo Done >> setup.bat
          echo pause >> setup.bat

      - name: Create ZIP
        run: |
          powershell Compress-Archive convert.exe,setup.bat convert-tool.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: convert-tool
          path: convert-tool.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: convert-tool.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}